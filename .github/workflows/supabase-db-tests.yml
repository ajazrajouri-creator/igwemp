name: Supabase CI DB Tests

on:
  push:
    branches:
      - main
      - s6-2-ci-validation
  pull_request:
  workflow_dispatch:

jobs:
  db-tests:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout
        uses: actions/checkout@v4

      - name: 2. Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 3. Install dependencies
        run: npm install

      - name: Create .env files from templates
        run: |
          cp .env.example .env
          cp .env.example .env.test

      - name: 4. Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Create logs folder
        run: mkdir -p ci-logs

      - name: 5. Verify Docker and Supabase
        run: |
          docker --version
          docker compose version
          docker info || true
          supabase --version || true

      - name: 6. Start Supabase
        run: supabase start 2>&1 | tee ci-logs/supabase-start.log

      - name: 7. Reset Database
        run: supabase db reset 2>&1 | tee ci-logs/supabase-db-reset.log

      - name: 8. Run pgTAP Database Tests
        run: supabase test db 2>&1 | tee ci-logs/supabase-test-db.log

      - name: Serve Edge Functions (Background)
        run: supabase functions serve employee-import --no-verify-jwt > ci-logs/edge-functions.log 2>&1 &
        
      - name: Wait for Edge Functions to start
        run: sleep 5

      - name: Run Edge Function Integration Test (Deno/Node)
        run: npx tsx scripts/ci_integration_test.ts 2>&1 | tee ci-logs/integration-test.log || true

      - name: 9. Run Build
        run: npm run build 2>&1 | tee ci-logs/build.log

      - name: 10. Run Vitest
        run: npx vitest run 2>&1 | tee ci-logs/vitest.log

      - name: Failure Diagnostics
        if: always()
        run: |
          {
            echo "=== DOCKER VERSION ==="
            docker --version
            echo "=== DOCKER COMPOSE VERSION ==="
            docker compose version
            echo "=== DOCKER INFO ==="
            docker info || true
            echo "=== SUPABASE VERSION ==="
            supabase --version || true
            echo "=== SUPABASE STATUS ==="
            supabase status || true
            echo "=== DOCKER PS ==="
            docker ps -a || true
            echo "=== DOCKER IMAGES ==="
            docker images || true
            echo "=== LS ==="
            ls -la || true
            echo "=== LS SUPABASE ==="
            ls -la supabase || true
            echo "=== FIND LOGS ==="
            find . -maxdepth 3 -type f -name "*.log" || true
          } > ci-logs/diagnostics.log 2>&1

      - name: 11. Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: s9-1-ci-logs
          path: ci-logs/
