name: Supabase CI DB Tests

on:
  push:
    branches:
      - main
      - s6-2-ci-validation
  pull_request:
  workflow_dispatch:

jobs:
  db-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Project Dependencies
        run: npm install


      - name: Create .env files from templates
        run: |
          cp .env.example .env
          cp .env.example .env.test

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 1.145.4

      - name: Diagnostics Before Start
        run: |
          docker --version
          docker compose version
          docker info
          supabase --version
          pwd
          ls -la
          ls -la supabase

      - name: Start Supabase Local Stack
        run: supabase start

      - name: Failure Diagnostics
        if: failure()
        run: |
          echo "=== DOCKER PS ==="
          docker ps -a
          echo "=== SUPABASE STATUS ==="
          supabase status || true
          echo "=== SUPABASE LOGS ==="
          docker logs supabase_db_igwemp || true
          docker logs supabase_rest_igwemp || true
          docker logs supabase_auth_igwemp || true
          docker logs supabase_api_igwemp || true

      - name: Reset Database and Apply Migrations & Seeds
        run: supabase db reset

      - name: Run pgTAP Database Tests
        run: supabase test db

      - name: Serve Edge Functions (Background)
        run: supabase functions serve employee-import --no-verify-jwt &
        
      - name: Wait for Edge Functions to start
        run: sleep 5

      - name: Run Edge Function Integration Test (Deno/Node)
        run: npx tsx scripts/ci_integration_test.ts

      - name: Run Vitest (Frontend & RPC Mocks)
        run: npx vitest run

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: supabase-logs
          path: supabase/logs/

      - name: Stop Supabase Stack
        if: always()
        run: supabase stop
